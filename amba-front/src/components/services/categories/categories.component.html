<section class="bg-gradient-to-b from-gray-50 to-white py-16 px-6">
  <div class="max-w-7xl mx-auto">

    <div class="text-center max-w-2xl mx-auto mb-12">
      <h2 class="text-2xl md:text-3xl font-extrabold text-[#0b1a5c] mb-3">
        Choisissez votre catégorie de service
      </h2>
      <p class="text-gray-600">
        Trois grandes familles de services pour répondre à vos besoins.
      </p>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      @for (c of categories; track c.id) {
        <a [href]="c.anchor" class="group relative bg-white rounded-2xl p-8 border border-gray-200 hover:border-transparent hover:shadow-2xl hover:-translate-y-2 transition-all overflow-hidden">
          <!-- Colored gradient accent -->
          <div [class]="'absolute top-0 right-0 w-32 h-32 -mt-12 -mr-12 rounded-full bg-gradient-to-br opacity-10 group-hover:opacity-20 blur-2xl transition ' + c.color"></div>

          <div [class]="'relative w-16 h-16 rounded-2xl bg-gradient-to-br flex items-center justify-center text-4xl mb-5 shadow-md ' + c.color"></div>
          <div class="absolute top-8 left-8 text-4xl">{{ c.icon }}</div>

          <h3 class="text-xl font-bold text-[#0b1a5c] mb-3">{{ c.title }}</h3>
          <p class="text-sm text-gray-600 leading-relaxed mb-5">{{ c.desc }}</p>
          <span class="text-[#007FFF] text-sm font-bold group-hover:text-[#FCD116] transition">
            En savoir plus →
          </span>
        </a>
      }
    </div>
  </div>
</section>
