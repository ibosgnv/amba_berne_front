<header class="flex items-center gap-6 px-7 py-2.5 bg-[#1e0e04] sticky top-0 z-[100]">
  <div class="flex items-center gap-2.5 shrink-0">
    <!-- Placeholder: embassy emblem (replace with actual image) -->
    <div class="w-[52px] h-[52px] rounded-full border-2 border-white/35 bg-[#c8a96e]"></div>
    <p class="text-[7px] text-white/85 leading-[1.4] tracking-[0.03em] m-0 uppercase">
      AMBASSADE<br>
      DE LA RÉPUBLIQUE<br>
      DÉMOCRATIQUE<br>
      DU CONGO<br>
      EN SUISSE
    </p>
  </div>

  <nav class="flex items-center gap-1 border-[1.5px] border-white/30 rounded-[50px] px-2 py-1">
    <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
       routerLink="/"
       routerLinkActive="nav-active"
       [routerLinkActiveOptions]="{ exact: true }">
      Accueil
    </a>
    <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
       routerLink="/passeports" routerLinkActive="nav-active">PASSEPORTS</a>
    <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
       routerLink="/visas" routerLinkActive="nav-active">VISAS ET VIVRE AU CONGO</a>
    <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
       routerLink="/rdc-suisse" routerLinkActive="nav-active">La RDC en Suisse</a>
    <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
       routerLink="/autres-services" routerLinkActive="nav-active">AUTRES SERVICES</a>
  </nav>
</header>
