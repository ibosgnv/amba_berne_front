<div class="page">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo-section">
      <div class="logo-circle">
        <!-- Temporary placeholder: DRC flag-inspired emblem -->
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="26" fill="#007fff"/>
          <path d="M0,32 L52,20 L52,32 L0,44 Z" fill="#cc0000" stroke="#f5c000" stroke-width="2"/>
          <polygon points="8,10 10,16 16,16 11,20 13,26 8,22 3,26 5,20 0,16 6,16" fill="#f5c000"/>
        </svg>
      </div>
      <p class="logo-text">
        AMBASSADE<br>
        DE LA RÉPUBLIQUE<br>
        DÉMOCRATIQUE<br>
        DU CONGO<br>
        EN SUISSE
      </p>
    </div>

    <nav class="nav-pill">
      <a class="nav-item"
         routerLink="/"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">
        Accueil
      </a>
      <a class="nav-item" routerLink="/passeports" routerLinkActive="active">PASSEPORTS</a>
      <a class="nav-item" routerLink="/visas" routerLinkActive="active">VISAS ET VIVRE AU CONGO</a>
      <a class="nav-item" routerLink="/rdc-suisse" routerLinkActive="active">La RDC en Suisse</a>
      <a class="nav-item" routerLink="/autres-services" routerLinkActive="active">AUTRES SERVICES</a>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M0,45 C80,100 220,10 400,60 C580,110 760,15 960,55 C1120,85 1300,35 1440,55 L1440,140 L0,140 Z"
          fill="#72d4e0" opacity="0.65" />
        <path
          d="M0,70 C100,125 260,35 460,82 C660,130 840,38 1040,76 C1200,105 1350,58 1440,78 L1440,140 L0,140 Z"
          fill="white" />
      </svg>
    </div>
  </section>

  <!-- ===== APERÇU SERVICES ===== -->
  <section class="services-section">
    <app-apercu-service />
  </section>

  <!-- ===== ACTUALITÉS ===== -->
  <app-actualites />

  <!-- ===== INFOS UTILES ===== -->
  <app-infos-utiles />

  <!-- ===== CONTENT ===== -->
  <section class="content">
    <div class="content-inner">
      <div class="text-block">
        <h1 class="main-title">
          l'Ambassade du Dhhr Congo<br>en Suisse
        </h1>
        <p class="subtitle">de personnes à travers le monde n'oublient pas de venir ici.</p>
      </div>

      <div class="floating-globe">
        <!-- Temporary placeholder: globe icon -->
        <svg viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg">
          <circle cx="23" cy="23" r="23" fill="#2a7ab5"/>
          <ellipse cx="23" cy="23" rx="9" ry="23" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
          <line x1="0" y1="23" x2="46" y2="23" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
          <line x1="0" y1="14" x2="46" y2="14" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <line x1="0" y1="32" x2="46" y2="32" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="23" cy="23" r="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
        </svg>
      </div>
    </div>
  </section>

</div>
