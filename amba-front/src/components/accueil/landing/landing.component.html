<div class="min-h-screen bg-white">

  <!-- ===== HEADER ===== -->
  <header class="flex items-center gap-6 px-7 py-2.5 bg-[#1e0e04] sticky top-0 z-[100]">
    <div class="flex items-center gap-2.5 shrink-0">
      <div class="w-[52px] h-[52px] rounded-full overflow-hidden border-2 border-white/35 bg-[#3a2810] flex items-center justify-center">
        <!-- Temporary placeholder: DRC flag-inspired emblem -->
        <svg class="w-full h-full" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="26" fill="#007fff"/>
          <path d="M0,32 L52,20 L52,32 L0,44 Z" fill="#cc0000" stroke="#f5c000" stroke-width="2"/>
          <polygon points="8,10 10,16 16,16 11,20 13,26 8,22 3,26 5,20 0,16 6,16" fill="#f5c000"/>
        </svg>
      </div>
      <p class="text-[7px] text-white/85 leading-[1.4] tracking-[0.03em] m-0 uppercase">
        AMBASSADE<br>
        DE LA RÉPUBLIQUE<br>
        DÉMOCRATIQUE<br>
        DU CONGO<br>
        EN SUISSE
      </p>
    </div>

    <nav class="flex items-center gap-1 border-[1.5px] border-white/30 rounded-[50px] px-2 py-1">
      <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
         routerLink="/"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{ exact: true }">
        Accueil
      </a>
      <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
         routerLink="/passeports" routerLinkActive="nav-active">PASSEPORTS</a>
      <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
         routerLink="/visas" routerLinkActive="nav-active">VISAS ET VIVRE AU CONGO</a>
      <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
         routerLink="/rdc-suisse" routerLinkActive="nav-active">La RDC en Suisse</a>
      <a class="inline-block px-4 py-1.5 rounded-[50px] text-[13px] text-white/85 no-underline whitespace-nowrap transition-colors duration-200 hover:bg-white/[0.12] hover:text-white"
         routerLink="/autres-services" routerLinkActive="nav-active">AUTRES SERVICES</a>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="relative w-full h-80 bg-[linear-gradient(135deg,#6b3a05_0%,#c47a10_25%,#a85c08_45%,#7a3d02_65%,#3d1e02_100%)] bg-cover bg-[center_30%] overflow-hidden">
    <div class="absolute inset-0 bg-[linear-gradient(to_bottom,rgba(90,45,5,0.35)_0%,rgba(110,60,0,0.20)_60%,transparent_100%)]"></div>
    <div class="absolute -bottom-0.5 left-0 w-full h-[140px]">
      <svg class="w-full h-full block" viewBox="0 0 1440 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M0,45 C80,100 220,10 400,60 C580,110 760,15 960,55 C1120,85 1300,35 1440,55 L1440,140 L0,140 Z"
          fill="#72d4e0" opacity="0.65" />
        <path
          d="M0,70 C100,125 260,35 460,82 C660,130 840,38 1040,76 C1200,105 1350,58 1440,78 L1440,140 L0,140 Z"
          fill="white" />
      </svg>
    </div>
  </section>

  <!-- ===== APERÇU SERVICES ===== -->
  <section class="px-10 py-8 bg-white">
    <app-apercu-service />
  </section>

  <!-- ===== ACTUALITÉS ===== -->
  <app-actualites />

  <!-- ===== INFOS UTILES ===== -->
  <app-infos-utiles />

  <!-- ===== CONTENT ===== -->
  <section class="content-wave bg-white px-[60px] pt-10 pb-[60px] relative overflow-hidden">
    <div class="flex items-start justify-between max-w-[900px] relative">
      <div class="flex-1">
        <h1 class="font-dancing text-[46px] font-bold text-[#1a2ea8] leading-[1.2] m-0 mb-4">
          l'Ambassade du Dhhr Congo<br>en Suisse
        </h1>
        <p class="text-sm text-[#888888] m-0 leading-relaxed">de personnes à travers le monde n'oublient pas de venir ici.</p>
      </div>

      <div class="w-[46px] h-[46px] rounded-full overflow-hidden shrink-0 mt-2 bg-[#3a85b5] flex items-center justify-center">
        <!-- Temporary placeholder: globe icon -->
        <svg class="w-full h-full" viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg">
          <circle cx="23" cy="23" r="23" fill="#2a7ab5"/>
          <ellipse cx="23" cy="23" rx="9" ry="23" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
          <line x1="0" y1="23" x2="46" y2="23" stroke="rgba(255,255,255,0.45)" stroke-width="1.2"/>
          <line x1="0" y1="14" x2="46" y2="14" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <line x1="0" y1="32" x2="46" y2="32" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="23" cy="23" r="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
        </svg>
      </div>
    </div>
  </section>

</div>
