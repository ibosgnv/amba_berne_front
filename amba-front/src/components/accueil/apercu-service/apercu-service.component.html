<section style="margin: 32px;  border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; padding: 24px 32px;">

  <!-- Title -->
  <h2 style="color: black; text-align: center; font-size: 25px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 24px 0;">
    SERVICE APERÇU
  </h2>

  <!-- Arrows + cards row -->
  <div style="display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px;">

    <!-- Left arrow -->
    <button
      (click)="prev()" [disabled]="!canPrev()" aria-label="Précédent"
      class="nav-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    <!-- Cards (3 equal columns) -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
      @for (service of visibleServices(); track $index) {
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.6); border-radius: 22px; padding: 20px;">

          <!-- Title box -->
          <div style="width: 100%; border: 1px solid rgba(255,255,255,0.6); border-radius: 14px; padding: 8px 12px; text-align: center;">
            <span style="color: black; font-size: 23px; font-weight: 500;">{{ service.title }}</span>
          </div>

          <!-- Circle image -->
          <div style="width: 150px; height: 150px; border-radius: 50%; overflow: hidden;">
            <img [src]="service.imageUrl" [alt]="service.title"
              style="width: 100%; height: 100%; object-fit: cover; display: block;" />
          </div>

        </div>
      }
    </div>

    <!-- Right arrow -->
    <button
      (click)="next()" [disabled]="!canNext()" aria-label="Suivant"
      class="nav-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>

  </div>

</section>
