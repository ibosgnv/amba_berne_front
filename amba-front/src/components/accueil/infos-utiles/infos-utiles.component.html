<section style="margin: 32px; padding: 24px 32px;">

  <!-- Title (outside the outer rounded box) -->
  <h2 style="color: #111111; font-size: 25px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 16px 4px; text-align: center;">
    INFOS UTILES
  </h2>

  <!-- Outer rounded container -->
  <div style=" border-radius: 36px; padding: 24px;">

    <!-- Div principale -->
    <div style=" border-radius: 30px; padding: 20px; display: flex; flex-direction: column; gap: 18px;">
      <p style="font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #444; margin: 0 0 0 4px;">
        <!--Div principale -->
      </p>

      <!-- DIV for title
      <div style="border: 1px solid rgba(0,0,0,0.4); border-radius: 20px; background-color: #ffd6a5; padding: 22px; display: flex; align-items: center; justify-content: center;">
        <span style="color: #7a3e00; font-size: 18px; font-weight: 600;">DIV for title</span>
      </div> -->

      <!-- DIV for categories -->
      <div style="border: 1px solid rgba(0,0,0,0.4); border-radius: 20px; background-color: #bde0fe; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;">
        @for (cat of categories; track cat.id) {
          <button
            (click)="setCategory(cat.id)"
            [style.background-color]="activeCategory() === cat.id ? '#0d3b66' : '#ffffff'"
            [style.color]="activeCategory() === cat.id ? '#ffffff' : '#0d3b66'"
            [style.border]="'1px solid ' + (activeCategory() === cat.id ? '#0d3b66' : 'rgba(0,0,0,0.3)')"
            style="padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;">
            {{ cat.label }}
          </button>
        }
      </div>

      <!-- Div for infos -->
      <div style=" border-radius: 22px; padding: 18px;  display: flex; flex-direction: column; gap: 10px;">
        <p style="font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #444; margin: 0 0 0 4px;">
          <!--Div for infos-->
        </p>

        <!-- Cards row — centers when fewer than 3, fills evenly otherwise -->
        <div style="display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; align-items: stretch;">
          @for (card of filteredCards(); track card.id) {
            <article class="info-card">

              <!-- Picture -->
              <div class="info-card-picture">
                @if (card.imageUrl) {
                  <img [src]="card.imageUrl" [alt]="card.title" />
                } @else {
                  <span class="info-card-picture-placeholder">{{ card.title }}</span>
                }
              </div>

              <!-- Text -->
              <div class="info-card-text">
                @if (card.imageUrl) {
                  <h3 class="info-card-title">{{ card.title }}</h3>
                  <p class="info-card-body">{{ card.text }}</p>
                } @else {
                  <p class="info-card-body" style="text-align: center;">{{ card.text }}</p>
                }
              </div>
            </article>
          }
        </div>
      </div>

    </div>

  </div>

</section>
