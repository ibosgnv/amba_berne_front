<section class="wave-section px-10 py-9 pb-12 bg-[#f8f8f8] relative overflow-hidden">

  <h2 class="font-anton text-[36px] font-black text-[#1a2080] tracking-[5px] text-center uppercase m-0 mb-[30px] relative">INFOS UTILES</h2>

  <!-- ===== CATEGORY TABS ===== -->
  <nav class="flex justify-center gap-2 flex-wrap mb-9 relative">
    @for (cat of categories; track cat.id) {
      <button
        class="tab-btn bg-transparent border-none text-sm font-bold tracking-[1px] text-[#333333] cursor-pointer px-4 py-1.5 uppercase relative transition-colors duration-200 hover:text-[#1a2080]"
        [class.active]="activeCategory() === cat.id"
        (click)="setCategory(cat.id)">
        {{ cat.label }}
      </button>
    }
  </nav>

  <!-- ===== CARDS GRID ===== -->
  <div class="grid grid-cols-3 gap-6 relative">
    @for (article of filteredArticles(); track article.id) {
      <article class="bg-white rounded-xl overflow-hidden shadow-[0_2px_14px_rgba(0,0,0,0.09)] flex flex-col">

        <!-- Image + announcement banner -->
        <div class="relative leading-none">
          <!-- Placeholder: article image (replace with actual photo) -->
          <div class="w-full h-[220px]"
            [style.background-color]="
              article.imageType === 'craftsman' ? '#2a2018' :
              article.imageType === 'citywoman' ? '#87ceeb' :
              article.imageType === 'eurostreet' ? '#d4c4a8' :
              article.imageType === 'meeting' ? '#e8e0d4' :
              article.imageType === 'party' ? '#1a0a2e' :
              article.imageType === 'factory' ? '#8090a0' :
              article.imageType === 'guide' ? '#5aaa50' :
              '#b8d4e8'
            ">
          </div>

          <!-- ANNOUNCEMENT banner -->
          <div class="absolute bottom-0 left-0 right-0 bg-[#111111] text-white text-[11px] font-bold tracking-[1.5px] uppercase py-[7px] px-3 flex items-center gap-1.5 leading-none">
            <span class="text-white text-[10px]">&#9733;</span>
            <span>ANNOUNCEMENT</span>
          </div>
        </div>

        <!-- Card body -->
        <div class="p-4 pb-2.5 flex-1">
          <a class="block text-[13px] font-bold text-[#dd2200] leading-[1.45] mb-2 cursor-pointer no-underline hover:underline">{{ article.title }}</a>
          <p class="text-[11.5px] text-[#666666] leading-[1.65] m-0">{{ article.excerpt }}</p>
        </div>

        <!-- Card footer -->
        <div class="flex justify-between items-center px-4 py-2 pb-3 border-t border-[#f0f0f0]">
          <span class="text-[11px] text-[#999999]">{{ article.author }}</span>
          <span class="text-[11px] text-[#999999]">{{ article.commentsCount }} comments</span>
        </div>

      </article>
    }
  </div>

</section>
