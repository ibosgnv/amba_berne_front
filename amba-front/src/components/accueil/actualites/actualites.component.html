<section class="wave-section px-10 py-8 pb-10 bg-white relative overflow-hidden">

  <h2 class="font-anton text-[34px] font-black text-[#dd1111] tracking-[4px] text-center m-0 mb-7 uppercase relative">ACTUALITÉS</h2>

  <div class="flex gap-6 items-start relative">

    <!-- ===== LEFT: FEATURED ARTICLE ===== -->
    <article class="flex-1 min-w-0">
      <!-- Placeholder: featured article image (replace with actual photo) -->
      <div class="w-full h-[360px] rounded-lg bg-[#c8b89a]"></div>

      <div class="pt-4">
        <h3 class="text-[17px] font-bold text-[#1a4a9e] m-0 mb-2.5 leading-snug">{{ featured.title }}</h3>
        <p class="text-[13px] text-[#555555] leading-relaxed m-0">{{ featured.excerpt }}</p>
      </div>
    </article>

    <!-- ===== RIGHT: SIDEBAR ===== -->
    <aside class="w-[220px] shrink-0 flex flex-col items-center gap-2">
      <button class="bg-transparent border-[1.5px] border-[#dddddd] rounded-full w-8 h-8 text-xl leading-none text-[#555555] cursor-pointer flex items-center justify-center p-0 shrink-0 transition-colors duration-200 hover:border-[#1a4a9e] hover:text-[#1a4a9e] disabled:text-[#cccccc] disabled:border-[#eeeeee] disabled:cursor-default"
        (click)="scrollUp()" [disabled]="!canScrollUp()" aria-label="Remonter">
        &#8679;
      </button>

      <div class="flex flex-col gap-2.5 w-full">
        @for (article of visibleSidebar(); track article.id) {
          <div class="sidebar-card relative rounded-[10px] overflow-hidden cursor-pointer leading-none">
            <div class="absolute top-0 left-0 bg-[#dd1111] text-white px-[7px] pt-[3px] pb-1 rounded-[10px_0_8px_0] z-[2] text-[11px] leading-[1.2]">
              <span class="block font-bold text-[13px]">{{ article.date }}</span>
              <span class="block text-[10px]">{{ article.month }}</span>
            </div>

            <!-- Placeholder: sidebar article image (replace with actual photo) -->
            <div class="w-full h-[120px]"
              [style.background-color]="
                article.imageType === 'flag-people' ? '#b0c4d8' :
                article.imageType === 'group' ? '#e8d8c0' :
                article.imageType === 'duo' ? '#d4c8b8' :
                article.imageType === 'outdoor' ? '#87ceeb' :
                '#1a1a3a'
              ">
            </div>

            <div class="card-overlay-gradient absolute bottom-0 left-0 right-0 bg-[linear-gradient(to_top,rgba(0,0,0,0.65)_0%,transparent_100%)] px-2 pt-[18px] pb-[7px] leading-[1.3] transition-[background] duration-200">
              <p class="text-[11px] font-bold text-white m-0 mb-0.5 leading-[1.3]">{{ article.title }}</p>
              <p class="text-[9.5px] text-white/85 m-0 leading-[1.3]">{{ article.excerpt }}</p>
            </div>
          </div>
        }
      </div>

      <button class="bg-transparent border-[1.5px] border-[#dddddd] rounded-full w-8 h-8 text-xl leading-none text-[#555555] cursor-pointer flex items-center justify-center p-0 shrink-0 transition-colors duration-200 hover:border-[#1a4a9e] hover:text-[#1a4a9e] disabled:text-[#cccccc] disabled:border-[#eeeeee] disabled:cursor-default"
        (click)="scrollDown()" [disabled]="!canScrollDown()" aria-label="Descendre">
        &#8681;
      </button>
    </aside>

  </div>
</section>
