<!-- Page wrapper: 12-column grid -->
<div style="display: grid; grid-template-columns: repeat(12, 1fr);">

  <!-- Navigation bar — full width (12 cols)
  <div style="grid-column: span 12; background-color: #4a90d9; padding: 1rem; text-align: center; color: white;">
    Navigation bar
  </div> -->

  <!-- DIV for patterns (outer wrapper) — full width (12 cols) -->
  <div style="grid-column: span 12; background-color: #f0e68c; position: relative; overflow: hidden; padding: 2rem; display: grid; grid-template-columns: repeat(12, 1fr);">

    <!-- DIV for image — full width (12 cols) -->
    <div style="grid-column: span 12; background-color: #e07b7b; position: relative; height: 60vh;">
      <h1>DIV for image (12 cols)</h1>
    </div>

    <!-- DIV for phrase d'accroche — full width (12 cols) -->
    <div style="grid-column: span 12; background-color: #7bc8e0; padding: 2rem; position: relative; z-index: 1; height: 60vh; overflow: hidden; display: grid; grid-template-columns: repeat(12, 1fr); align-content: center;">
      <!-- Pattern left -->
      <div style="position: absolute; top: 0; left: 0; width: 300px; height: 100%; background-image: url('/assets/patterns_amba.png'); background-repeat: no-repeat; background-size: 100% 100%; pointer-events: none;"></div>
      <!-- Pattern right (mirrored) -->
      <div style="position: absolute; top: 0; right: 0; width: 300px; height: 100%; background-image: url('/assets/patterns_amba.png'); background-repeat: no-repeat; background-size: 100% 100%; transform: scaleX(-1); pointer-events: none;"></div>

      <!-- DIV for title — cols 4-9 (centered) -->
      <div style="grid-column: 4 / 10; background-color: #a8e07b; padding: 1rem; margin-bottom: 1rem;">
        <h1>DIV for title (cols 4-9)</h1>
        <h1>Ambassade de la RD Congo</h1>
      </div>

      <!-- DIV for text — cols 4-9 (centered) -->
      <div style="grid-column: 4 / 10; background-color: #d9a0e0; padding: 1rem;">
        <h1>DIV for text (cols 4-9)</h1>
      </div>

    </div>

  </div>

</div>
